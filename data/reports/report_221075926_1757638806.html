<!doctype html><meta charset="utf-8">
<title>Профиль</title>
<style>
  :root{--ink:#111827;--muted:#6b7280;--bg:#f6f7f9;--card:#fff;--line:#e5e7eb}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.55 system-ui,Segoe UI,Roboto,Arial}
  .wrap{max-width:980px;margin:24px auto;padding:0 16px}
  h1{font-size:40px;margin:24px 0 8px}
  .muted{color:var(--muted)}
  .card{background:var(--card);border-radius:14px;padding:18px 20px;margin:16px 0;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .h2{font-weight:700;font-size:20px;margin:0 0 12px}
  .tbl{width:100%;border-collapse:collapse}
  .tbl th,.tbl td{border-top:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top}
  .tbl thead th{border-top:none;color:var(--muted);font-weight:600}
</style>
<div class="wrap">
  <h1>Профиль —</h1>
  <div class="muted">Твой ведущий способ действовать и принимать решения.</div>

  <div class="card">
    <div class="h2">Баланс векторов</div>
    <table class='tbl'><thead><tr><th>Вектор</th><th>Баланс</th></tr></thead><tbody><tr><td>Голова</td><td>0.0</td></tr><tr><td>Сердце</td><td>0.0</td></tr><tr><td>Руки</td><td>0.0</td></tr><tr><td>Креатив</td><td>0.0</td></tr></tbody></table>
  </div>

  <div class="card">
    <div class="h2">Коротко о типе</div>
    <p>Развёрнутое описание профиля появится после прохождения вопросов.</p>
  </div>

  <div class="card">
    <div class="h2">Модификаторы</div>
    <p>Пока недостаточно данных для модификаторов.</p>
  </div>
</div>
