services:
  - type: web
    name: trezorium-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main_dating
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_KEY
        sync: false
